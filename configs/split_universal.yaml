# Rung 5: Split architecture — Universal Physics + Regional Site + Fusion.
# Pretrained on California; downstream transfer configs (transfer_greece.yaml,
# transfer_chile.yaml) reuse the weights produced by this run.
rung: 5
model_name: split_transfer
notes: >
  Rung 5: split architecture. Universal Physics Encoder (3-component CNN,
  GroupNorm) + Regional Site Encoder (MLP on Vs30, CRUST1 Vp, sediment
  thickness, NEHRP one-hot, instrument one-hot) + Fusion head. Trained on
  California with event-grouped train/val and Ridgecrest/Coso geographic
  holdout. Physics branch takes only the waveform (hard rule #5).

loader:
  stead_dir: data/raw/stead
  csv_name: merge.csv
  hdf5_name: merge.hdf5
  region: California
  magnitude_min: 3.0
  magnitude_scales: [ml, mw]
  snr_min_db: 10.0
  window_samples: 500
  sample_rate_hz: 100
  bandpass_low_hz: 0.075
  bandpass_high_hz: 25.0
  bandpass_order: 4

split:
  strategy: california_ridgecrest
  test_lat_min: 35.3
  test_lat_max: 36.0
  test_lon_min: -118.0
  test_lon_max: -117.0
  val_fraction: 0.10
  seed: 0

model_hparams:
  phys_channels: [32, 64, 128, 128]
  phys_kernel_size: 7
  phys_stride: 2
  phys_groupnorm_groups: 8
  phys_embed_dim: 128
  phys_dropout: 0.1
  site_hidden: [64, 64]
  site_embed_dim: 32
  site_dropout: 0.1
  fusion_hidden: [128, 64]
  fusion_dropout: 0.1

train:
  epochs: 80                     # was 60, extended since warmup is longer
  batch_size: 256
  num_workers: 8                 # was 4 — laptop has more cores than this was using
  prefetch_factor: 4             # keep each worker holding 4 batches ahead
  lr: 0.0003                     # was 0.001 — peak LR too high, epoch 1 was best
  weight_decay: 0.0001
  warmup_epochs: 8               # was 3 — give the encoder time to settle
  grad_clip: 0.5                 # was 1.0 — gradients spiked at epoch 11 previously
  huber_delta: 1.0
  amp: true
  early_stopping_patience: 15    # was 10 — longer warmup needs more runway
  bin_width: 1.0
  sampler_cap: 3.0               # was 10.0 — diagnostic run showed sampler overcorrection (bias drifting +0.56 by epoch 6); 3x is gentler and should keep M[3-4] from being sacrificed for M[5-6]
  require_cuda: true
  seed: 0

aux_losses:
  fc_weight: 0.5                 # was 0.2 — aux heads barely learning (aux MSE ~0.22 in log-space, close to target variance)
  tau_c_weight: 0.5              # was 0.2 — same reason
  pd_weight: 0.0                 # Pd is site-modified; keep physics branch clean

separation:
  weight: 0.05                   # coefficient on L_sep (within-event variance of physics embedding)
  events_per_batch: 32           # batch_size = 32 * 8 = 256, matches train.batch_size
  stations_per_event: 8
  min_stations_per_event: 2      # drop singleton events — can't compute within-event variance on k=1
